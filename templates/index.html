
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Music Recommendations</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Header Section -->
    <div class="container text-center py-5">
        <h1 class="display-4">Welcome to Your Music Recommendation Website</h1>
        <p class="lead">Enter your preferences and discover songs you'll love!</p>
    </div>

    <!-- Form Section -->
    <div class="container">
        <div class="card mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Your Preferences</h2>
                <form id="music-form">
                    <div class="mb-3">
                        <label for="genre" class="form-label">What's your favorite genre?</label>
                        <input type="text" id="genre" name="genre" class="form-control" placeholder="e.g., Pop" required>
                    </div>
                    <div class="mb-3">
                        <label for="artist" class="form-label">Who's your favorite artist?</label>
                        <input type="text" id="artist" name="artist" class="form-control" placeholder="e.g., Taylor Swift" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Find My Songs!</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Placeholder for Results (if dynamically injected) -->
    <div class="container mt-5" id="results-container" style="display: none;">
        <h2 class="text-center">Your Recommendations</h2>
        <div id="results" class="row mt-4">
            <!-- Results will be injected here dynamically -->
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- External JavaScript -->
    <script src="/static/script.js"></script>
</body>
</html>
