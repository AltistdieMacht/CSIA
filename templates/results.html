<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Playlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">Your Custom Playlist</h1>
        <p class="text-center lead">Mood: <strong>{{ mood }}</strong></p>
        <div class="card mx-auto" style="max-width: 540px;">
            <img src="{{ playlist_cover }}" class="card-img-top" alt="Playlist Cover">
            <div class="card-body">
                <h5 class="card-title">{{ playlist_name }}</h5>
                <p class="card-text">{{ playlist_description }}</p>
                <h6 class="mt-4">Preview of Songs:</h6>
                <ul class="list-group mb-3">
                    {% for song in preview_songs %}
                        <li class="list-group-item">{{ song }}</li>
                    {% endfor %}
                </ul>
                <a href="{{ playlist_link }}" class="btn btn-primary" target="_blank">Open on Spotify</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
