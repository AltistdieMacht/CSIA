<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Playlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .cover-image {
            max-width: 100%;
            border-radius: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="bg-light text-dark">
    <div class="container py-5">
        <h1 class="mb-4 text-center">{{ custom_title }}</h1>
        <div class="text-center mb-4">
            <img src="{{ playlist_image }}" alt="Playlist Cover" class="cover-image">
        </div>
        <ul class="list-group mb-4">
            {% for song in songs %}
            <li class="list-group-item d-flex align-items-center">
                {% if song.image %}
                    <img src="{{ song.image }}" alt="Album Cover" width="60" class="me-3">
                {% endif %}
                <div>
                    <strong>{{ song.title }}</strong> – {{ song.artist }}<br>
                    {% if song.spotify_url %}
                        <a href="{{ song.spotify_url }}" target="_blank">Listen on Spotify</a>
                    {% endif %}
                </div>
            </li>
            {% endfor %}
        </ul>
        <div class="text-center">
            <a href="{{ playlist_url }}" class="btn btn-success btn-lg me-3">🎵 Open Playlist</a>
            <a href="/" class="btn btn-outline-primary btn-lg">🔄 Neue Playlist erstellen</a>
        </div>
    </div>
</body>
</html>
