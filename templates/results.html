<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Recommendations</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Header Section -->
    <div class="container text-center py-5">
        <h1 class="display-4">Your Music Recommendations</h1>
        <p class="lead">Here are some songs tailored just for you!</p>
    </div>

    <!-- Recommendations Section -->
    <div class="container">
        <div class="row">
            {% for song in recommendations %}
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    <img src="{{ song.image }}" class="card-img-top" alt="{{ song.title }}">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">{{ song.title }}</h5>
                        <p class="card-text">Artist: {{ song.artist }}</p>
                        <p class="card-text">Custom Popularity: {{ song.adjusted_popularity }}</p>
                        <a href="{{ song.link }}" class="btn btn-primary mt-auto" target="_blank">Listen on Spotify</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
