<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Personalized Playlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .cover-image {
            max-width: 300px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .song-card {
            background-color: #e9ecef;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }
        .song-card:hover {
            background-color: #dee2e6;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .song-image {
            height: 64px;
            width: 64px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 1rem;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <h1 class="mb-3 text-center">🎵 Your Personalized Playlist</h1>
    <h2 class="mb-4 text-center text-primary">{{ custom_title }}</h2>

    <div class="text-center mb-4">
        <img src="{{ cover_url }}" alt="Cover Image" class="cover-image">
    </div>

    <div class="text-center mb-5">
        <a href="{{ playlist_url }}" class="btn btn-success btn-lg" target="_blank">🎧 Listen on Spotify</a>
    </div>

    {% for song in songs %}
        <div class="song-card">
            {% if song.image %}<img src="{{ song.image }}" alt="Cover" class="song-image">{% endif %}
            <div>
                <h5 class="mb-0">"{{ song.title }}"</h5>
                <small>{{ song.artist }}</small><br>
                {% if song.spotify_url %}<a href="{{ song.spotify_url }}" target="_blank">Listen on Spotify</a>{% endif %}
            </div>
        </div>
    {% endfor %}
</div>
</body>
</html>
