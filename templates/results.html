<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Recommendations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">Your Song Recommendations</h1>
        <p class="text-center lead">Based on your mood: {{ mood }}</p>
        <div class="row">
            {% for song in recommendations %}
            <div class="col-md-4">
                <div class="card mb-4">
                    <img src="{{ song.image or 'https://via.placeholder.com/150' }}" class="card-img-top" alt="{{ song.title }}">
                    <div class="card-body">
                        <h5 class="card-title">{{ song.title }}</h5>
                        <p class="card-text"><strong>Artist:</strong> {{ song.artist }}</p>
                        <p class="card-text"><strong>Popularity Score:</strong> {{ song.popularity }}</p>
                        <a href="{{ song.link }}" class="btn btn-primary" target="_blank">Listen on Spotify</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
